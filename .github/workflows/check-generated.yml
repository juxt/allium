name: Check generated files

on:
  pull_request:
    paths:
      - '.claude/agents/**'
      - 'skills/tend/**'
      - 'skills/weed/**'
      - '.github/agents/**'
      - 'scripts/generate-multi-editor.mjs'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/generate-multi-editor.mjs --check
